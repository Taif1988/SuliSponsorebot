<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin.css?v=2" />
</head>
<body>

<div id="loginBox" class="login-box">
  <h1>لوحة تحكم الأدمن</h1>
  <input id="passwordInput" type="password" placeholder="كلمة المرور" />
  <button id="loginBtn">دخول</button>
  <p id="loginError" class="error" hidden>كلمة المرور غير صحيحة</p>
</div>

<div id="dashboard" class="dashboard" hidden>
  <header class="admin-header">
    <h1>مراجعة الإعلانات</h1>
    <div class="status-tabs">
      <button class="status-tab active" data-status="pending">قيد المراجعة</button>
      <button class="status-tab" data-status="approved">منشورة</button>
      <button class="status-tab" data-status="rejected">مرفوضة</button>
    </div>
  </header>

  <div id="adminList" class="admin-list"></div>
</div>

<script src="/js/admin.js?v=2"></script>
</body>
</html>
